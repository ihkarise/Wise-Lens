<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Wise Lens · Intake</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
/* ============ Wise brand tokens ============ */
:root{
  --wh-blue:#2A3C78; --wh-red:#C21F35; --navy:#132A5C;
  --ink:#1b2440; --muted:#717a93; --faint:#9aa2b8;
  --line:#e5e8f1; --bg:#f4f6fb; --card:#ffffff; --field:#fafbff;
  --ok:#13935a; --ok-bg:#e7f5ed; --warn:#c07d00; --warn-bg:#fdf3e0;
  --bad:#C21F35; --bad-bg:#fbe9ec; --info-bg:#eef1fb;
  --shadow:0 1px 2px rgba(19,42,92,.06),0 8px 24px rgba(19,42,92,.06);
  --r:14px; --r-sm:10px;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--bg);
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;
}
h1,h2,h3{font-family:'Poppins',sans-serif;font-weight:600;margin:0;letter-spacing:-.01em}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:15px}
img{display:block;max-width:100%}

/* ============ shell ============ */
.app{max-width:620px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}
.topbar{
  position:sticky;top:0;z-index:30;background:var(--wh-blue);color:#fff;
  padding:calc(var(--safe-t) + 12px) 18px 12px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 10px rgba(19,42,92,.18);
}
.logo{width:34px;height:34px;border-radius:9px;background:#fff;display:grid;place-items:center;flex:0 0 auto}
.logo svg{width:22px;height:22px}
.brand .t{font-family:'Poppins';font-weight:600;font-size:16px;line-height:1.05}
.brand .s{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#b9c2e6}
.topbar .spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);color:#fff;display:grid;place-items:center}
.iconbtn:active{background:rgba(255,255,255,.22)}
.iconbtn svg{width:20px;height:20px}
.demo-pill{font-size:10.5px;font-weight:600;letter-spacing:.1em;background:var(--wh-red);color:#fff;padding:4px 8px;border-radius:999px}

main{flex:1;padding:18px 16px 130px}
.section-eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin:0 2px 10px}

/* ============ stepper ============ */
.steps{display:flex;gap:6px;padding:14px 16px 0}
.step{flex:1;height:4px;border-radius:3px;background:var(--line);transition:background .3s}
.step.on{background:var(--wh-blue)}
.step.done{background:var(--ok)}

/* ============ capture ============ */
.hero{text-align:center;padding:14px 8px 22px}
.hero h1{font-size:23px;line-height:1.15}
.hero p{color:var(--muted);margin:8px auto 0;max-width:30ch;font-size:14px}
.cap-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.cap-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 14px;
  text-align:center;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;position:relative;overflow:hidden
}
.cap-card:active{transform:scale(.975)}
.cap-card .ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;margin:0 auto 10px}
.cap-card.bill .ic{background:var(--info-bg);color:var(--wh-blue)}
.cap-card.cover .ic{background:var(--bad-bg);color:var(--wh-red)}
.cap-card .ic svg{width:26px;height:26px}
.cap-card h3{font-size:15px}
.cap-card .sub{font-size:12px;color:var(--muted);margin-top:3px}
.cap-card input{position:absolute;inset:0;opacity:0;cursor:pointer}

.queue{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.shot{
  display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:8px;box-shadow:var(--shadow)
}
.shot img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex:0 0 auto;background:var(--field)}
.shot .meta{flex:1;min-width:0}
.shot .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shot .tag{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.shot .tag.bill{color:var(--wh-blue)}
.shot .tag.cover{color:var(--wh-red)}
.shot .x{width:32px;height:32px;border-radius:8px;color:var(--muted);display:grid;place-items:center;flex:0 0 auto}
.shot .x:active{background:var(--bg)}
.shot .x svg{width:18px;height:18px}

/* ============ buttons ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-weight:600;font-size:15px;border-radius:12px;padding:14px 18px;width:100%;
  background:var(--wh-blue);color:#fff;transition:filter .12s,transform .12s
}
.btn:active{transform:scale(.985);filter:brightness(.94)}
.btn[disabled]{opacity:.45;pointer-events:none}
.btn.ghost{background:transparent;color:var(--wh-blue);border:1.5px solid var(--line)}
.btn.red{background:var(--wh-red)}
.btn svg{width:18px;height:18px}

/* sticky bottom bar */
.dock{
  position:fixed;left:0;right:0;bottom:0;z-index:25;
  padding:12px 16px calc(var(--safe-b) + 12px);
  background:linear-gradient(180deg,rgba(244,246,251,0) 0%,var(--bg) 28%);
}
.dock-inner{max-width:620px;margin:0 auto;display:flex;gap:10px;align-items:center}
.dock .count{flex:0 0 auto;font-size:12.5px;color:var(--muted);font-weight:500}

/* ============ processing ============ */
.proc{padding:40px 12px;text-align:center}
.spin{width:46px;height:46px;border-radius:50%;border:3.5px solid var(--line);border-top-color:var(--wh-blue);margin:0 auto 18px;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.proc p{color:var(--muted);font-size:14px}
.proc .now{font-weight:600;color:var(--ink)}

/* ============ review ============ */
.summary{
  display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap
}
.chip-stat{
  flex:1;min-width:88px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:10px 12px;box-shadow:var(--shadow)
}
.chip-stat .n{font-family:'JetBrains Mono';font-weight:600;font-size:20px;line-height:1}
.chip-stat .l{font-size:11px;color:var(--muted);margin-top:3px}
.chip-stat.rec .n{color:var(--ok)}
.chip-stat.add .n{color:var(--wh-blue)}
.chip-stat.skip .n{color:var(--faint)}

.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;
  box-shadow:var(--shadow);overflow:hidden;border-left:4px solid var(--line)
}
.card.ok{border-left-color:var(--ok)}
.card.warn{border-left-color:var(--warn)}
.card.bad{border-left-color:var(--bad)}
.card.skipped{opacity:.55}
.card-head{padding:13px 14px;display:flex;gap:10px;align-items:flex-start}
.card-head .grow{flex:1;min-width:0}
.card .name{font-family:'Poppins';font-weight:600;font-size:15.5px;line-height:1.2;width:100%;
  border:none;background:transparent;color:var(--ink);padding:0}
.card .name:focus{outline:none;background:var(--field);border-radius:6px;padding:2px 4px;margin:-2px -4px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px;letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px}
.chip.match{background:var(--ok-bg);color:var(--ok)}
.chip.new{background:var(--info-bg);color:var(--wh-blue)}
.chip.origin{background:var(--bg);color:var(--muted)}
.chip.lowconf{background:var(--warn-bg);color:var(--warn)}
.chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.caret{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--faint);flex:0 0 auto;transition:transform .2s}
.card.open .caret{transform:rotate(180deg)}
.caret svg{width:18px;height:18px}

.card-glance{padding:0 14px 13px;display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted)}
.card-glance b{color:var(--ink);font-family:'JetBrains Mono';font-weight:600}

.card-body{display:none;padding:4px 14px 14px;border-top:1px solid var(--line)}
.card.open .card-body{display:block}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;margin-top:12px}
.f{display:flex;flex-direction:column;gap:4px}
.f.wide{grid-column:1/-1}
.f label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint)}
.f input{background:var(--field);border:1px solid var(--line);border-radius:8px;padding:9px 10px;color:var(--ink)}
.f input:focus{outline:none;border-color:var(--wh-blue);background:#fff}
.f input.mono{font-family:'JetBrains Mono'}
.f input[readonly]{color:var(--muted);background:#f1f2f7;border-style:dashed}
.f .hint{font-size:10.5px;color:var(--faint)}

.actions{display:flex;gap:6px;margin-top:14px;background:var(--bg);padding:4px;border-radius:11px}
.actions button{flex:1;padding:9px 4px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);transition:.12s}
.actions button.sel.rec{background:var(--ok);color:#fff}
.actions button.sel.add{background:var(--wh-blue);color:#fff}
.actions button.sel.skip{background:var(--faint);color:#fff}

/* ============ done ============ */
.done{padding:46px 18px;text-align:center}
.done .seal{width:72px;height:72px;border-radius:50%;background:var(--ok-bg);color:var(--ok);display:grid;place-items:center;margin:0 auto 18px}
.done .seal svg{width:38px;height:38px}
.done h2{font-size:21px}
.done p{color:var(--muted);margin-top:8px}
.recap{margin:22px auto 0;max-width:340px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:6px 16px;box-shadow:var(--shadow)}
.recap .row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:14px}
.recap .row:last-child{border-bottom:none}
.recap .row b{font-family:'JetBrains Mono'}

/* ============ sheet (settings) ============ */
.scrim{position:fixed;inset:0;background:rgba(19,42,92,.4);z-index:40;display:none}
.scrim.on{display:block}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:41;background:#fff;border-radius:20px 20px 0 0;
  padding:8px 18px calc(var(--safe-b) + 22px);max-width:620px;margin:0 auto;transform:translateY(100%);
  transition:transform .26s cubic-bezier(.4,0,.2,1);max-height:86dvh;overflow:auto
}
.sheet.on{transform:translateY(0)}
.grab{width:40px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 16px}
.sheet h3{font-size:17px;margin-bottom:4px}
.sheet .desc{font-size:13px;color:var(--muted);margin-bottom:16px}
.field-row{margin-bottom:14px}
.field-row label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px}
.field-row input{width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
.field-row .help{font-size:11px;color:var(--faint);margin-top:5px}
.toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0}
.switch{width:46px;height:27px;border-radius:999px;background:var(--line);position:relative;transition:.18s;flex:0 0 auto}
.switch.on{background:var(--ok)}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.switch.on i{left:22px}

.toast{
  position:fixed;left:50%;bottom:calc(var(--safe-b) + 96px);transform:translateX(-50%) translateY(20px);
  background:var(--navy);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:999px;
  z-index:50;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 8px 24px rgba(0,0,0,.25);max-width:88vw;text-align:center
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
:focus-visible{outline:2px solid var(--wh-blue);outline-offset:2px}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6.5" stroke="#2A3C78" stroke-width="2.2"/><path d="M16 16l4.5 4.5" stroke="#C21F35" stroke-width="2.6" stroke-linecap="round"/></svg>
    </div>
    <div class="brand">
      <div class="t">Wise Lens</div>
      <div class="s">Intake</div>
    </div>
    <div class="spacer"></div>
    <span id="demoPill" class="demo-pill">DEMO</span>
    <button class="iconbtn" id="openSettings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <div class="steps">
    <div class="step on" data-step="1"></div>
    <div class="step" data-step="2"></div>
    <div class="step" data-step="3"></div>
  </div>

  <main id="main"></main>
</div>

<div class="dock" id="dock"></div>

<!-- settings sheet -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <div class="grab"></div>
  <h3>Settings</h3>
  <p class="desc">Connect Lens to your WHIMS backend. Leave blank to explore in demo mode with sample data.</p>
  <div class="field-row">
    <label for="execUrl">Apps Script Web App URL</label>
    <input id="execUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off" spellcheck="false">
    <div class="help">Your WHIMS /exec endpoint. Sign in with staff credentials after saving.</div>
  </div>
  <div class="field-row" id="acctRow" style="display:none">
    <label>Account</label>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--field);border:1px solid var(--line);border-radius:10px;padding:10px 12px">
      <span id="acctWho" style="font-size:14px;font-weight:600"></span>
      <button class="btn ghost" id="signOut" style="width:auto;padding:8px 14px;font-size:13px">Sign out</button>
    </div>
  </div>
  <div class="toggle">
    <div><div style="font-weight:600;font-size:14px">Force demo mode</div><div style="font-size:12px;color:var(--muted)">Use built-in sample bill and covers</div></div>
    <div class="switch" id="demoSwitch"><i></i></div>
  </div>
  <button class="btn" id="saveSettings" style="margin-top:10px">Save</button>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ===================================================================
   WISE LENS — Phase 1 frontend
   Capture → AI extract → reconcile (bill↔cover) → review → stage to WHIMS
   Single-file. Backend contract (Apps Script, text/plain POST):
     {action:'extract',   token, kind:'bill'|'cover', image:<base64>, mime} -> structured object
     {action:'inventory', token} -> {ok, items:[{id,name,pack,potency,category}]}
     {action:'stageIntake', token, rows:[...]} -> {ok, staged:n}
   =================================================================== */

/* ---- config / persistence (localStorage key: wiseLens1) ---- */
const LS_KEY = 'wiseLens1';
const DEFAULTS = {
  // Hardcode the deployed /exec here once Code.gs is live (staff devices skip setup):
  execUrl: '',
  token: '',           // WHIMS session token (from login), not a static secret
  user: '',
  forceDemo: false,
};
let CFG = loadCfg();
window.CFG = CFG;   // debug / integration hook
function loadCfg(){ try{ return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(LS_KEY)||'{}')); }catch(e){ return {...DEFAULTS}; } }
function saveCfg(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(CFG)); }catch(e){} }
function isDemo(){ return CFG.forceDemo || !CFG.execUrl; }
function needsLogin(){ return !isDemo() && !CFG.token; }    // live backend but no session yet
function clearSession(){ CFG.token=''; CFG.user=''; saveCfg(); }

/* ---- app state ---- */
const S = {
  screen:'capture',     // capture | voice | processing | review | done
  shots:[],             // {id, kind:'bill'|'cover', dataUrl, name, captureMode}
  rows:[],              // reconciled review rows
  inventory:null,       // cached inventory snapshot
  procText:'',
  voice:null,           // transient voice-capture state
};
let _id=0; const uid=p=>`${p}${(++_id).toString(36)}${Date.now().toString(36).slice(-3)}`;
window.S=S;   // debug / integration hook

/* ===================================================================
   1. CAPTURE
   =================================================================== */
function addShots(kind, files, captureMode){
  const mode = captureMode || 'CAMERA';
  ensureSession();
  [...files].forEach(file=>{
    IntakeCore.bump(S.session, mode);
    const shot={ id:uid('s'), kind, dataUrl:'', name:file.name||`${kind} photo`, captureMode:mode, sessionId:S.session.id, status:'processing', stats:null, note:'' };
    S.shots.push(shot);
    render();                                   // show skeleton immediately (UI stays responsive)
    ImagePipe.process(file).then(out=>{
      shot.dataUrl=out.dataUrl; shot.stats=out; shot.status='ready'; render();
    }).catch(async err=>{
      // never block intake — fall back to a quick downscale, keep a gentle note
      try{ shot.dataUrl=await downscale(file,1400,0.7); shot.status='ready'; shot.stats={fallback:true}; shot.note=err.message||''; }
      catch(e){ shot.status='error'; shot.note=err.message||'Could not process this photo — try again'; }
      render();
    });
  });
}
function downscale(file, max, q){
  return new Promise((res,rej)=>{
    const img=new Image(); const url=URL.createObjectURL(file);
    img.onload=()=>{
      let{width:w,height:h}=img;
      const scale=Math.min(1, max/Math.max(w,h));
      w=Math.round(w*scale); h=Math.round(h*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg', q));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(); };
    img.src=url;
  });
}

/* ===================================================================
   2. EXTRACT + RECONCILE
   =================================================================== */
async function runExtract(){
  const ready = S.shots.filter(s=>s.status==='ready' && s.dataUrl);
  if(!ready.length){ toast(S.shots.some(s=>s.status==='processing')?'Still optimising photos — one moment':'Add a photo first'); return; }
  S.screen='processing'; S.proc={total:ready.length,done:0,startedAt:Date.now(),step:'Reading'}; render();
  let extractions=[];
  try{
    // inventory first (for matching) — cached for the session
    S.procText='Loading inventory…';
    paintProc();
    S.inventory = await getInventory();

    for(let i=0;i<ready.length;i++){
      const sh=ready[i];
      S.procText=`Reading ${sh.kind} ${i+1} of ${ready.length}…`;
      paintProc();
      const data = await extractOne(sh);
      extractions.push({kind:sh.kind, data, captureMode:sh.captureMode||'CAMERA'});
      S.proc.done=i+1; paintProc();
    }
    S.rows = reconcile(extractions, S.inventory);
    const sid = ensureSession().id; S.rows.forEach(r=>{ if(!r.sessionId) r.sessionId=sid; });
    scheduleSave();
    S.screen='review'; render();
  }catch(err){
    S.screen='capture'; render();
    toast('Could not read the photos — '+(err.message||'try again'));
  }
}

async function extractOne(shot){
  if(isDemo()) return demoExtract(shot.kind);
  const base64 = shot.dataUrl.split(',')[1];
  const r = await post({ action:'extract', kind:shot.kind, image:base64, mime:'image/jpeg' });
  if(!r.ok) throw new Error(r.error||'extract failed');
  return r.data;
}
async function getInventory(){
  if(isDemo()) return DEMO_INVENTORY;
  const r = await post({ action:'inventory' });
  if(!r.ok) throw new Error(r.error||'inventory failed');
  return r.data||r.items||[];   // merged WHIMS backend returns {data}; standalone returned {items}
}
async function post(body){
  const r = await fetch(CFG.execUrl, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'}, // text/plain avoids CORS preflight
    body: JSON.stringify(Object.assign({token:CFG.token}, body)),
  });
  const data = await r.json();
  if(data && data.ok===false && /unauthor|session expired|log in/i.test(data.error||'')){
    clearSession();
    S.screen='capture'; render();
    throw new Error('Session expired — please sign in again');
  }
  return data;
}
async function login(username, password){
  const r = await fetch(CFG.execUrl, {
    method:'POST',

/* ---- reconcile: build rows from bill lines, merge covers, match inventory ---- */
function reconcile(extractions, inventory){
  const billLines=[], covers=[];
  extractions.forEach(e=>{
    const cm=e.captureMode||'CAMERA';
    if(e.kind==='bill' && e.data){
      const sup=e.data.supplier||'';
      (e.data.lines||[]).forEach(l=> billLines.push(Object.assign({supplier:sup, captureMode:cm}, l)));
    } else if(e.kind==='cover' && e.data){
      covers.push(Object.assign({captureMode:cm}, e.data));
    }
  });

  const rows=[];
  const coverUsed=new Array(covers.length).fill(false);

  // one row per bill line; attach best matching cover
  billLines.forEach(line=>{
    let best=-1, bestScore=0;
    covers.forEach((cv,ci)=>{
      if(coverUsed[ci]) return;
      const sc=itemSim(line, cv);
      if(sc>bestScore){ bestScore=sc; best=ci; }
    });
    const cv = (best>=0 && bestScore>=0.55) ? covers[best] : null;
    if(cv) coverUsed[best]=true;
    rows.push(makeRow(line, cv, cv?'both':'bill', inventory));
  });

  // covers with no bill line → standalone rows
  covers.forEach((cv,ci)=>{
    if(coverUsed[ci]) return;
    rows.push(makeRow(null, cv, 'cover', inventory));
  });

  return rows;
}

function makeRow(line, cover, origin, inventory){
  const name = pick(cover&&cover.name, line&&line.name) || '';
  const potency = normPot(pick(cover&&cover.potency, line&&line.potency) || '');
  const pack = pick(line&&line.pack, cover&&cover.pack) || '';
  const r = {
    id: uid('r'),
    origin,                                   // both | bill | cover
    name,
    pack,
    potency,
    category: deriveCategory(potency),
    qty: line ? num(line.qty) : '',           // bottles — only the bill knows
    unitCost: line ? num(line.unitCost) : '', // only the bill knows
    supplier: pick(cover&&cover.brand, line&&line.supplier) || '', // cover brand wins
    mfd: cover ? (cover.mfd||'') : '',
    expiry: cover ? (cover.expiry||'') : '',
    barcode: cover ? (cover.barcode||'') : '',
    batch: cover ? (cover.batch||'') : '',    // shown as aid only, never staged
    confidence: line && cover ? 'high' : (line||cover ? 'med' : 'low'),
    action:'', matchId:'', matchName:'', codeFamily:'',
    captureMode: pick(line&&line.captureMode, cover&&cover.captureMode) || 'CAMERA',
  };
  // match against live inventory
  const m = matchInventory(r, inventory);
  if(m){ r.matchId=m.id; r.matchName=m.name; r.action='receive'; }
  else { r.codeFamily=resolvePrefix(r.category, r.pack, r.potency); r.action='add'; }
  // a cover-only row with no qty can't be received meaningfully — flag low
  if(origin==='cover' && r.action==='receive' && r.qty==='') r.confidence='med';
  return r;
}

/* ---- matching helpers ---- */
function normName(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function normPot(s){
  let p=String(s||'').toUpperCase().replace(/\s+/g,'').replace(/POTENCY|POT/g,'');
  if(p==='Q'||p==='MT'||p==='Ø'||p==='TINCTURE'||p==='MOTHERTINCTURE') return 'MT';
  const m=p.match(/^(\d+)(C|CH|X|D|M|LM)?$/);
  if(m){ return m[1]+(m[2]?m[2].replace('CH','C'):''); }
  return p;
}
function bigrams(s){ const a=[]; for(let i=0;i<s.length-1;i++) a.push(s.slice(i,i+2)); return a; }
function dice(a,b){
  a=normName(a); b=normName(b);
  if(!a||!b) return 0;
  if(a===b) return 1;
  const A=bigrams(a), B=bigrams(b); if(!A.length||!B.length) return 0;
  const m={}; A.forEach(x=>m[x]=(m[x]||0)+1);
  let hit=0; B.forEach(x=>{ if(m[x]>0){ hit++; m[x]--; } });
  return (2*hit)/(A.length+B.length);
}
function itemSim(line, cover){
  let s = dice(line.name, cover.name)*0.8;
  const lp=normPot(line.potency), cp=normPot(cover.potency);
  if(lp&&cp){ s += (lp===cp ? 0.2 : -0.25); }
  if(line.pack && cover.pack && normName(line.pack)===normName(cover.pack)) s+=0.05;
  return Math.max(0,Math.min(1,s));
}
function matchInventory(r, inventory){
  if(!inventory||!inventory.length) return null;
  let best=null, bestScore=0;
  inventory.forEach(it=>{
    let sc=dice(r.name, it.name);
    const rp=normPot(r.potency), ip=normPot(it.potency);
    if(rp&&ip){ if(rp===ip) sc+=0.12; else sc-=0.2; }
    if(r.pack && it.pack && normName(r.pack)===normName(it.pack)) sc+=0.08;
    if(sc>bestScore){ bestScore=sc; best=it; }
  });
  return bestScore>=0.7 ? best : null;
}
/* Choose the SKU prefix family the catalog way (form → potency → pack). The final
   number is minted server-side on approval, so we show only the family here. */
function resolvePrefix(category, pack, potency){
  const cat=String(category||'').toUpperCase(), pk=String(pack||'').toUpperCase(), pot=normPot(potency);
  const ml=(pk.match(/(\d+)\s*ML/)||[])[1]||'';
  if(/CREAM|GEL|OINT|TUBE/.test(cat)||/CREAM|GEL|OINT/.test(pk)) return 'EX';
  if(cat==='OIL'||/OIL/.test(pk)) return 'OIL';
  if(cat==='MT'||pot==='MT') return ml==='30'?'MTS':'MT';
  if(cat==='BC') return 'BC';
  if(ml==='15') return 'DLX';
  if(ml==='30') return 'DLXX';
  return 'DL';
}
function deriveCategory(potency){
  const p=normPot(potency);
  if(p==='MT') return 'MT';            // mother tincture
  if(/X$/.test(p)) return 'BC';        // biochemic (X potency) — editable
  if(p) return 'DL';                   // dilution — editable
  return '';
}

/* ---- tiny utils ---- */
function pick(){ for(const a of arguments){ if(a!==undefined&&a!==null&&String(a).trim()!=='') return a; } return ''; }
function num(v){ const n=parseFloat(v); return isNaN(n)?'':n; }

/* ===================================================================
   3. STAGE TO WHIMS
   =================================================================== */
async function stageBatch(){
  const label = r => {
    if(r.origin==='voice') return 'Voice';
    const base = r.origin==='both'?'Reconciled':(r.origin==='bill'?'Bill':'Cover');
    const cm = r.captureMode==='GALLERY'?' (gallery)':(r.captureMode==='CAMERA'?'':' ('+String(r.captureMode||'').toLowerCase()+')');
    return base+cm;
  };
  const rows=S.rows.filter(r=>r.action!=='skip').map(r=>({
    source: label(r),
    entrySource:'WISE_LENS',                       // audit: who created it
    captureMode: r.captureMode||'CAMERA',          // audit: CAMERA / GALLERY / VOICE
    sessionId: r.sessionId||'',                    // intake session reference
    action: r.action==='receive'?'RECEIVE':'ADD_NEW',
    matchedId: r.matchId||'',
    proposedId: r.action==='add'?(r.codeFamily||''):'',
    name:r.name, pack:r.pack, potency:r.potency, category:r.category,
    qty:r.qty, unitCost:r.unitCost, supplier:r.supplier,
    mfd:r.mfd, expiry:r.expiry, barcode:r.barcode,
    confidence:r.confidence,
    // note: batch is intentionally NOT sent — WHIMS does not track it
  }));
  if(!rows.length){ toast('Nothing to stage — every row is skipped'); return; }

  const btn=document.getElementById('stageBtn');
  if(btn){ btn.disabled=true; btn.textContent='Staging…'; }

  if(!isDemo() && typeof navigator!=='undefined' && navigator.onLine===false){
    OfflineQueue.enqueue({ rows, session:S.session });
    if(S.session){ S.session.status='queued'; }
    IntakeCore.clearDraft(); S.stagedCounts=counts(); S.queued=true; S.screen='done'; render();
    toast('Saved offline — will upload when you’re back online');
    return;
  }

  if(isDemo()){
    await new Promise(r=>setTimeout(r,650));
    S.stagedCounts=counts();
    if(S.session){ S.session.status='completed'; S.session.completedTime=new Date().toISOString(); }
    IntakeCore.clearDraft();
    S.screen='done'; render();
    return;
  }
  try{
    const r=await post({ action:'stageIntake', rows });
    if(!r.ok) throw new Error(r.error||'stage failed');
    S.stagedCounts=counts();
    if(S.session){ S.session.status='completed'; S.session.completedTime=new Date().toISOString(); }
    IntakeCore.clearDraft();
    S.screen='done'; render();
  }catch(err){
    if(btn){ btn.disabled=false; btn.textContent='Stage for review in WHIMS'; }
    toast('Could not stage — '+(err.message||'check connection'));
  }
}
function counts(){
  const c={receive:0,add:0,skip:0};
  S.rows.forEach(r=>c[r.action]++);
  return c;
}

/* ---- transcript → structured medicine JSON (same shape OCR produces) ---- */
const VoiceParser=(function(){
  const NUM={zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9,ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19,twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
  const SCALE={hundred:100,thousand:1000};
  const MONTH={january:1,jan:1,february:2,feb:2,march:3,mar:3,april:4,apr:4,may:5,june:6,jun:6,july:7,jul:7,august:8,aug:8,september:9,sept:9,sep:9,october:10,oct:10,november:11,nov:11,december:12,dec:12};
  const BRANDS=['sbl','bakson','reckeweg','schwabe','adel','allen','haslab','bjain','wheezal','medisynth','hapdco','lords','bhargava','fourrts'];
  const FILLER=new Set(['of','the','a','an','and','please','bottle','bottles','bottls','nos','no','number','units','unit','vials','vial','pcs','pieces','from','medicine','homeopathy','homeo','expiry','expires','expire','exp','expiring','best','before','potency','pack','size','dilution']);
  function wnum(words){ let total=0,cur=0,seen=false;
    for(const w of words){ if(w in NUM){ cur+=NUM[w]; seen=true; }
      else if(w in SCALE){ cur=(cur||1)*SCALE[w]; if(SCALE[w]===1000){ total+=cur; cur=0; } seen=true; }
      else if(/^\d+$/.test(w)){ cur+=parseInt(w,10); seen=true; } else break; }
    return seen? total+cur : null; }
  function yearFrom(words){ words=words.filter(Boolean); if(!words.length) return '';
    if(/^\d{4}$/.test(words[0])) return words[0];
    if(words[0] in NUM){ const a=NUM[words[0]];
      if(a>=19&&a<=20){ const rest=words.slice(1).filter(w=>w in NUM||/^\d+$/.test(w));
        let low=0; rest.forEach(w=>{ low+=(w in NUM)?NUM[w]:parseInt(w,10); });
        if(rest.length) return String(a*100+low); }
      const n=wnum(words); if(n&&n>=1900&&n<=2100) return String(n); }
    return ''; }
  function parse(t){
    const raw=String(t||'').trim();
    let s=' '+raw.toLowerCase().replace(/[.,/]/g,' ').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ')+' ';
    const out={name:'',potency:'',pack:'',qty:'',supplier:'',expiry:'',raw};
    // EXPIRY (month + year, or 2030-03)
    let me=s.match(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|sept|oct|nov|dec)[a-z]*\s+([a-z0-9]+(?:\s+[a-z0-9]+){0,2})/);
    if(me){ const mon=MONTH[me[1]]||MONTH[me[1].slice(0,3)]; const yr=yearFrom(me[2].trim().split(' '));
      if(mon&&yr) out.expiry=yr+'-'+String(mon).padStart(2,'0'); s=s.replace(me[0],' '); }
    else { const my=s.match(/\b(20\d{2})[\s-]*(0?[1-9]|1[0-2])\b/); if(my){ out.expiry=my[1]+'-'+String(my[2]).padStart(2,'0'); s=s.replace(my[0],' '); } }
    // PACK (number + ml / g)
    let mp=s.match(/\b((?:one|two|three|four|five|six|seven|eight|nine|ten|hundred|\d+)(?:\s+hundred)?)\s*(ml|millilit(?:re|er)s?|g|gram?s?|gm)\b/);
    if(mp){ const n=wnum(mp[1].trim().split(' '))||parseInt(mp[1],10); const unit=/^m/.test(mp[2])?'ML':'G';
      if(n) out.pack=n+' '+unit; s=s.replace(mp[0],' '); }
    // POTENCY
    let pot='', mc=null;
    if(/\bmother\s+tincture\b|\bmother\b|\btincture\b|\bq\b/.test(s)) pot='MT';
    let mx=s.match(/\b(\d+)\s*x\b/); if(!pot&&mx) pot=mx[1]+'X';
    let mm=s.match(/\b(\d+|one|two|three|four|five|six)\s*m\b/); if(!pot&&mm){ const n=(mm[1] in NUM)?NUM[mm[1]]:mm[1]; pot=n+'M'; }
    let mlm=s.match(/\blm\s*(\d+)\b/); if(!pot&&mlm) pot='LM'+mlm[1];
    mc=s.match(/\b(3|6|9|12|15|18|24|30|200|1000)\s*(?:c|ch|cn|potency)?\b/); if(!pot&&mc) pot=mc[1];
    if(pot){ out.potency=pot;
      s=s.replace(/\bmother\s+tincture\b|\bmother\b|\btincture\b|\bq\b/g,' ').replace(/\b\d+\s*x\b/g,' ')
         .replace(/\blm\s*\d+\b/g,' ').replace(/\b(\d+)\s*m\b/g,' ');
      if(mc) s=s.replace(new RegExp('\\b'+mc[1]+'\\b'),' '); }
    // QTY (n bottles / leading n)
    let mq=s.match(/\b((?:\d+)|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve|twenty|thirty)\s*(?:bottles?|bottls?|nos|units?|vials?|pcs?|pieces?)\b/);
    if(mq){ out.qty=(mq[1] in NUM)?NUM[mq[1]]:parseInt(mq[1],10); s=s.replace(mq[0],' '); }
    else { const lead=s.match(/^\s*((?:\d+)|one|two|three|four|five|six|seven|eight|nine|ten)\b/);
      if(lead){ out.qty=(lead[1] in NUM)?NUM[lead[1]]:parseInt(lead[1],10); s=s.replace(lead[0],' '); } }
    // SUPPLIER (from <brand>)
    let msup=s.match(/\bfrom\s+([a-z]+)(?:\s+([a-z]+))?/);
    if(msup){ let sup=msup[1];
      if(BRANDS.indexOf(sup)>=0) sup=sup.toUpperCase();
      else sup=(msup[1]+(msup[2]?' '+msup[2]:'')).trim().toUpperCase();
      out.supplier=sup; s=s.replace(msup[0],' '); }
    // NAME (leftover words minus fillers/units/lone numbers)
    const words=s.split(/\s+/).filter(w=>w&&!FILLER.has(w)&&!(w in SCALE));
    const nameWords=words.filter(w=>!/^(ml|g|gram?s?|gm|x|m|c|ch|cn)$/.test(w)&&!/^\d+$/.test(w));
    out.name=nameWords.map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ').trim();
    return out;
  }
  return { parse };
})();

/* ---- speech providers ---- */
function WebSpeechProvider(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  let rec=null, manualStop=false, h={};
  return {
    id:'web-speech', label:'Browser · Web Speech (on-device, free)', needsKey:false,
    isSupported(){ return !!SR; },
    start(handlers){ h=handlers||{}; if(!SR){ h.onerror&&h.onerror(new Error('This browser has no speech recognition — try Chrome, or a cloud engine')); return; }
      manualStop=false; rec=new SR(); rec.lang=(h.lang)||'en-IN'; rec.interimResults=true; rec.continuous=true;
      rec.onresult=e=>{ let fin='',intr=''; for(let i=e.resultIndex;i<e.results.length;i++){ const r=e.results[i]; (r.isFinal?fin+=r[0].transcript:intr+=r[0].transcript); }
        if(fin&&h.onfinal) h.onfinal(fin); if(intr&&h.onpartial) h.onpartial(intr); };
      rec.onerror=e=>{ h.onerror&&h.onerror(new Error(e.error||'speech error')); };
      rec.onend=()=>{ if(!manualStop){ try{ rec.start(); }catch(e){} } else h.onend&&h.onend(); };
      try{ rec.start(); h.onstart&&h.onstart(); }catch(e){ h.onerror&&h.onerror(e); } },
    pause(){ manualStop=true; if(rec) try{ rec.stop(); }catch(e){} },
    resume(){ this.start(h); },
    stop(){ manualStop=true; if(rec) try{ rec.stop(); }catch(e){} h.onend&&h.onend(); return Promise.resolve(); },
    abort(){ manualStop=true; if(rec) try{ rec.abort(); }catch(e){} }
  };
}
function blobToB64(blob){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',').pop()); r.onerror=rej; r.readAsDataURL(blob); }); }
function CloudSTTProvider(id,label){
  let media=null, chunks=[], stream=null, h={};
  const sup=()=>!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.MediaRecorder);
  return {
    id, label, needsKey:true,
    isSupported(){ return sup(); },
    async start(handlers){ h=handlers||{}; if(!sup()){ h.onerror&&h.onerror(new Error('Audio recording not supported here')); return; }
      try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); media=new MediaRecorder(stream); chunks=[];
        media.ondataavailable=e=>{ if(e.data&&e.data.size) chunks.push(e.data); };
        media.start(); h.onstart&&h.onstart(); h.onpartial&&h.onpartial('Listening… cloud transcription runs after you stop.');
      }catch(e){ h.onerror&&h.onerror(e); } },
    pause(){ if(media&&media.state==='recording') media.pause(); },
    resume(){ if(media&&media.state==='paused') media.resume(); },
    async stop(){ if(!media){ h.onend&&h.onend(); return; }
      await new Promise(res=>{ media.onstop=res; try{ media.stop(); }catch(e){ res(); } });
      if(stream) stream.getTracks().forEach(t=>t.stop());
      try{ const blob=new Blob(chunks,{type:(media&&media.mimeType)||'audio/webm'}); const b64=await blobToB64(blob);
        const r=await post({action:'transcribe', provider:id, audio:b64, mime:blob.type});
        if(!r||!r.ok) throw new Error((r&&r.error)||'transcription failed');
        const text=(r.data&&(r.data.text||r.data.transcript))||r.text||'';
        h.onfinal&&h.onfinal(text);
      }catch(e){ h.onerror&&h.onerror(new Error(e.message+' — add the backend "transcribe" action, or use Browser voice')); }
      h.onend&&h.onend(); },
    abort(){ if(media) try{ media.stop(); }catch(e){} if(stream) stream.getTracks().forEach(t=>t.stop()); }
  };
}

const VoiceLens=(function(){
  const providers={}; let activeId='web-speech';
  function register(p){ providers[p.id]=p; }
  register(WebSpeechProvider());
  [['whisper','OpenAI Whisper (cloud)'],['openai','OpenAI Speech (cloud)'],['gemini','Google Gemini (cloud)'],
   ['google','Google Speech-to-Text (cloud)'],['azure','Azure Speech (cloud)']].forEach(p=>register(CloudSTTProvider(p[0],p[1])));
  function active(){ return providers[activeId]; }
  function use(id){ if(providers[id]){ activeId=id; if(S.voice) S.voice.provider=id; } }
  function list(){ return Object.keys(providers).map(id=>({id,label:providers[id].label,supported:providers[id].isSupported(),needsKey:providers[id].needsKey})); }
  function open(){
    if(!providers[activeId].isSupported()){ const f=Object.keys(providers).find(id=>providers[id].isSupported()); if(f) activeId=f; }
    S.voice={status:'idle',transcript:'',partial:'',seconds:0,parsed:null,provider:activeId};
    S.screen='voice'; render();
  }
  return { register, use, active, list, providers, open, parse:VoiceParser.parse, get activeId(){ return activeId; } };
})();

let _vTimer=null,_vStream=null,_vAudioCtx=null,_vRAF=null;
function fmtTime(s){ const m=Math.floor(s/60),ss=s%60; return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0'); }

async function startViz(){ try{

  _vAudioCtx=new AC(); const src=_vAudioCtx.createMediaStreamSource(_vStream); const an=_vAudioCtx.createAnalyser(); an.fftSize=256; src.connect(an);
  const cv=document.getElementById('vWave'); if(!cv) return; const g=cv.getContext('2d'); const buf=new Uint8Array(an.frequencyBinCount);
  const draw=()=>{ _vRAF=requestAnimationFrame(draw); an.getByteFrequencyData(buf); g.clearRect(0,0,cv.width,cv.height);
    const bars=32, step=Math.max(1,Math.floor(buf.length/bars)), w=cv.width/bars;
    for(let i=0;i<bars;i++){ const v=buf[i*step]/255, hh=Math.max(3,v*cv.height);
      g.fillStyle='rgba(42,60,120,'+(0.3+v*0.7)+')'; g.fillRect(i*w+1,(cv.height-hh)/2,w-2,hh); } };
  draw();
}catch(e){} }
function stopViz(){ if(_vRAF) cancelAnimationFrame(_vRAF); _vRAF=null; if(_vAudioCtx){ try{ _vAudioCtx.close(); }catch(e){} _vAudioCtx=null; }
  if(_vStream){ _vStream.getTracks().forEach(t=>t.stop()); _vStream=null; } }

function voiceStart(){ const p=VoiceLens.active(); S.voice.status='recording'; S.voice.partial='';
  renderVoice(); clearInterval(_vTimer); _vTimer=setInterval(vTick,1000); startViz();
  p.start({ lang:'en-IN',
    onpartial:t=>{ S.voice.partial=t; paintTranscript(); },
    onfinal:t=>{ S.voice.transcript=(S.voice.transcript+' '+t).trim(); S.voice.partial=''; paintTranscript(); },
    onerror:e=>{ toast(e.message||'Voice error'); clearInterval(_vTimer); stopViz(); if(S.voice){ S.voice.status='idle'; renderVoice(); } },
    onstart:()=>{}, onend:()=>{} }); }
function voicePause(){ const p=VoiceLens.active(); if(p.pause) p.pause(); S.voice.status='paused'; clearInterval(_vTimer); stopViz(); renderVoice(); }
function voiceResume(){ const p=VoiceLens.active(); S.voice.status='recording'; clearInterval(_vTimer); _vTimer=setInterval(vTick,1000); startViz();
  if(p.resume) p.resume(); else voiceStart(); renderVoice(); }
async function voiceStop(){ const p=VoiceLens.active(); S.voice.status='processing'; renderVoice(); clearInterval(_vTimer); stopViz();
  try{ await p.stop(); }catch(e){}
  setTimeout(()=>{ if(!S.voice) return; const full=(S.voice.transcript+' '+(S.voice.partial||'')).trim();
    S.voice.transcript=full; S.voice.partial=''; S.voice.parsed=VoiceLens.parse(full); S.voice.status='done'; renderVoice(); }, 350); }
async function voiceAdd(){ const pr=S.voice&&S.voice.parsed;
  if(!pr||!pr.name){ toast('Couldn’t catch a medicine name — record again'); return; }
  if(!S.inventory){ try{ S.inventory=await getInventory(); }catch(e){ S.inventory=[]; } }
  const line={ name:pr.name, potency:pr.potency, pack:pr.pack, qty:pr.qty, unitCost:'', supplier:pr.supplier, captureMode:'VOICE' };
  const row=makeRow(line, null, 'voice', S.inventory);
  row.expiry=pr.expiry||''; row.captureMode='VOICE';
  ensureSession(); IntakeCore.bump(S.session,'VOICE'); row.sessionId=S.session.id;
  S.rows.push(row); scheduleSave(); S.voice=null; S.screen='review'; render(); toast('Added — review and stage');
}
function voiceBack(){ const p=VoiceLens.active(); if(p&&p.abort) try{ p.abort(); }catch(e){} clearInterval(_vTimer); stopViz(); S.voice=null; S.screen='capture'; render(); }

function renderVoice(){
  const v=S.voice||{status:'idle',seconds:0,transcript:'',partial:''};
  const provs=VoiceLens.list();
  const opts=provs.map(p=>`<option value="${p.id}" ${p.id===VoiceLens.activeId?'selected':''} ${p.supported?'':'disabled'}>${esc(p.label)}${p.supported?'':' — not available here'}</option>`).join('');
  const rec=v.status==='recording', paused=v.status==='paused', proc=v.status==='processing', done=v.status==='done';
  const micIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4"/></svg>';

      <div class="v-parsed">${kv('Medicine',pr.name)}${kv('Potency',pr.potency)}${kv('Pack',pr.pack)}${kv('Qty',pr.qty)}${kv('Supplier',pr.supplier)}${kv('Expiry',pr.expiry)}</div>
      <div class="v-btns"><button class="v-ghost" id="vAgain">↺ Record again</button><button class="v-go" id="vAdd">Add to review →</button></div>`;
  } else {

    const label= proc?'Transcribing…' : rec?'Listening… tap to stop' : paused?'Paused' : 'Tap to start recording';
    const onclick = proc?'' : rec?'voiceStop()' : paused?'voiceResume()' : 'voiceStart()';
    body=`<div class="v-prov"><select id="vProv" ${rec||proc?'disabled':''}>${opts}</select>
        <div class="hint">Swap the engine anytime — Browser is on-device &amp; free; cloud engines need the backend transcribe proxy.</div></div>
      <button class="${micCls}" ${onclick?`onclick="${onclick}"`:''} ${proc?'disabled':''}>${micIcon}</button>
      <div class="v-time" id="vTime">${fmtTime(v.seconds)}</div>
      <div class="v-state">${label}</div>
      <canvas class="v-wave" id="vWave" width="420" height="58"></canvas>
      <div class="v-tx" id="vTx">${v.transcript?esc(v.transcript):'<span class="partial">Say e.g. “five bottles of Arnica Montana mother tincture 100 ml from SBL expiry March 2030”.</span>'}</div>
      ${(rec||paused)?`<div class="v-btns">${rec?'<button class="v-ghost" id="vPause">❚❚ Pause</button>':'<button class="v-ghost" id="vResume">▶ Resume</button>'}<button class="v-go" id="vStop2">■ Stop &amp; read</button></div>`:''}`;
  }

  bind('vPause',voicePause); bind('vResume',voiceResume); bind('vStop2',voiceStop);
  bind('vAgain',()=>{ S.voice={status:'idle',transcript:'',partial:'',seconds:0,parsed:null,provider:VoiceLens.activeId}; renderVoice(); });
  bind('vAdd',voiceAdd);
  dock.innerHTML=`<div class="dock-inner"><button class="btn ghost" id="vBack" style="flex:0 0 auto;width:auto;padding:14px 16px">← Back</button></div>`;
  const bk=document.getElementById('vBack'); if(bk) bk.addEventListener('click',voiceBack);
  if(rec) paintTranscript();
}

/* ===================================================================
   IMAGE PIPELINE  —  client-side optimisation before any upload
   -------------------------------------------------------------------
   read → EXIF auto-rotate (createImageBitmap from-image) → strip metadata
   (canvas re-encode) → HEIC/HEIF decode (lazy) → resize longest side 1400px
   → JPEG q0.75 → if >300KB q0.65 → if still >300KB resize 1200px q0.60.
   Heavy work runs in a Web Worker (OffscreenCanvas) with a main-thread
   fallback. Nothing original is ever uploaded; only the optimised JPEG.
   =================================================================== */
(function injectImgCSS(){
  const css=`
  .shot{ position:relative; }
  .shot.processing .thumb,.shot .skel{ background:linear-gradient(100deg,var(--field,#eef1f8) 30%,rgba(255,255,255,.6) 50%,var(--field,#eef1f8) 70%);
    background-size:200% 100%; animation:shimmer 1.2s infinite linear; }
  @keyframes shimmer{ 0%{ background-position:200% 0; } 100%{ background-position:-200% 0; } }
  .shot .skel{ width:46px; height:46px; border-radius:10px; flex:0 0 auto; }
  .shot .stats{ font-size:11px; color:var(--muted,#76809b); margin-top:2px; }
  .shot .stats .save{ color:#1E8E5A; font-weight:600; }
  .shot .err{ font-size:11.5px; color:var(--bad,#C21F35); margin-top:2px; }
  html[data-theme="dark"] .shot .skel,html[data-theme="dark"] .shot.processing .thumb{ background:linear-gradient(100deg,rgba(255,255,255,.06) 30%,rgba(255,255,255,.14) 50%,rgba(255,255,255,.06) 70%); background-size:200% 100%; }
  `;
  const st=document.createElement('style'); st.id='img-css'; st.textContent=css; document.head.appendChild(st);
})();

const ImagePipe=(function(){
  const MAX1=1400, MAX2=1200, Q1=0.75, Q2=0.65, Q3=0.60, TARGET=300*1024;
  const HEIC_CDN='https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';

  // ---- pure helpers (unit-tested) ----
  function human(b){ b=Number(b)||0; if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(b<10240?1:0)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
  function extType(nameOrType){ const s=String(nameOrType||'').toLowerCase();
    if(/hei[cf]/.test(s)) return 'heic'; if(/jpe?g/.test(s)) return 'jpeg'; if(/png/.test(s)) return 'png';
    if(/webp/.test(s)) return 'webp'; return 'other'; }
  function isHeic(file){ if(!file) return false; return extType(file.type)==='heic' || extType(file.name)==='heic'; }
  function scaleDims(w,h,max){ const s=Math.min(1, max/Math.max(w,h)); return { w:Math.max(1,Math.round(w*s)), h:Math.max(1,Math.round(h*s)) }; }
  function targetMet(bytes){ return bytes<=TARGET; }
  function savedPct(orig,out){ orig=Number(orig)||0; out=Number(out)||0; return orig>0?Math.max(0,Math.round((1-out/orig)*100)):0; }

  // ---- inline Web Worker (decode → resize → adaptive encode) ----
  const workerSrc = `self.onmessage=async function(e){var d=e.data;try{var bmp=await createImageBitmap(d.blob,{imageOrientation:'from-image'});var ow=bmp.width,oh=bmp.height;function scale(max){var s=Math.min(1,max/Math.max(ow,oh));return{w:Math.max(1,Math.round(ow*s)),h:Math.max(1,Math.round(oh*s))};}async function enc(dim,q){var c=new OffscreenCanvas(dim.w,dim.h);var g=c.getContext('2d');g.drawImage(bmp,0,0,dim.w,dim.h);return await c.convertToBlob({type:'image/jpeg',quality:q});}var dim=scale(d.max1),q=d.q1,b=await enc(dim,q);if(b.size>d.target){q=d.q2;b=await enc(dim,q);}if(b.size>d.target){dim=scale(d.max2);q=d.q3;b=await enc(dim,q);}if(bmp.close)bmp.close();self.postMessage({id:d.id,ok:true,blob:b,width:dim.w,height:dim.h,bytes:b.size,quality:q,origW:ow,origH:oh});}catch(err){self.postMessage({id:d.id,ok:false,error:String(err&&err.message||err)});}};`;

  let worker=null, jobs={}, jid=0;
  function ensureWorker(){
    if(worker!==null) return worker;
    if(!(window.Worker && window.OffscreenCanvas && ('createImageBitmap' in window) && window.URL && URL.createObjectURL)){ worker=false; return false; }
    try{
      worker=new Worker(URL.createObjectURL(new Blob([workerSrc],{type:'text/javascript'})));
      worker.onmessage=e=>{ const j=jobs[e.data.id]; if(!j) return; delete jobs[e.data.id];
        e.data.ok?j.res(e.data):j.rej(new Error(e.data.error||'worker failed')); };
      worker.onerror=()=>{ Object.keys(jobs).forEach(k=>{ jobs[k].rej(new Error('worker error')); delete jobs[k]; }); };
    }catch(e){ worker=false; }
    return worker;
  }
  function runWorker(w,opts){ return new Promise((res,rej)=>{ const id=++jid; jobs[id]={res,rej}; opts.id=id; w.postMessage(opts); }); }

  // ---- main-thread fallback (no Worker / OffscreenCanvas) ----
  function loadImg(blob){ return new Promise((res,rej)=>{ const i=new Image(); const u=URL.createObjectURL(blob);
    i.onload=()=>{ URL.revokeObjectURL(u); res(i); }; i.onerror=()=>{ URL.revokeObjectURL(u); rej(new Error('decode failed')); }; i.src=u; }); }
  async function runMain(blob,o){
    let bmp,ow,oh;
    if('createImageBitmap' in window){ bmp=await createImageBitmap(blob,{imageOrientation:'from-image'}); ow=bmp.width; oh=bmp.height; }
    else { bmp=await loadImg(blob); ow=bmp.naturalWidth; oh=bmp.naturalHeight; }
    const enc=(dim,q)=>new Promise(r=>{ const c=document.createElement('canvas'); c.width=dim.w; c.height=dim.h;
      c.getContext('2d').drawImage(bmp,0,0,dim.w,dim.h); c.toBlob(b=>r(b),'image/jpeg',q); });
    let dim=scaleDims(ow,oh,o.max1),q=o.q1,b=await enc(dim,q);
    if(b.size>o.target){ q=o.q2; b=await enc(dim,q); }
    if(b.size>o.target){ dim=scaleDims(ow,oh,o.max2); q=o.q3; b=await enc(dim,q); }
    return { blob:b, width:dim.w, height:dim.h, bytes:b.size, quality:q, origW:ow, origH:oh };
  }

  // ---- HEIC (lazy decoder, only when actually needed) ----
  function loadHeic(){ return new Promise((res,rej)=>{ if(window.heic2any) return res();
    const s=document.createElement('script'); s.src=HEIC_CDN; s.onload=()=>res();
    s.onerror=()=>rej(new Error('offline')); document.head.appendChild(s); }); }
  async function decodeHeic(file){ await loadHeic();
    const out=await window.heic2any({ blob:file, toType:'image/jpeg', quality:0.92 });
    return Array.isArray(out)?out[0]:out; }

  function blobToDataURL(blob){ return new Promise((res,rej)=>{ const r=new FileReader();
    r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(blob); }); }

  // ---- public: optimise one file ----
  async function process(file){
    const origBytes=file.size||0;
    let src=file;
    if(isHeic(file)){
      try{ src=await decodeHeic(file); }
      catch(e){ throw new Error('This looks like an iPhone HEIC photo and couldn’t be opened here. Tip: in iPhone Settings → Camera → Formats choose “Most Compatible”, or pick a JPEG from Gallery.'); }
    }
    const opts={ max1:MAX1, max2:MAX2, q1:Q1, q2:Q2, q3:Q3, target:TARGET };
    const w=ensureWorker();
    const out = w ? await runWorker(w,Object.assign({blob:src},opts)) : await runMain(src,opts);
    const dataUrl=await blobToDataURL(out.blob);
    return { dataUrl, bytes:out.bytes, width:out.width, height:out.height, quality:out.quality,
      origBytes, origW:out.origW, origH:out.origH, savedPct:savedPct(origBytes,out.bytes),
      megapixels: out.origW&&out.origH ? +((out.origW*out.origH)/1e6).toFixed(1) : null };
  }

  return { process, isHeic, extType, human, scaleDims, targetMet, savedPct,
    workerActive:()=>!!ensureWorker(), _:{MAX1,MAX2,Q1,Q2,Q3,TARGET} };
})();
window.ImagePipe=ImagePipe;

/* ===================================================================
   INTAKE CORE  —  the "assistant" layer (pure, JSDoc-typed, testable)
   Session · per-field confidence · fuzzy duplicates · warnings ·
   staging validation · session summary · auto-save / resume.
   Pure functions only — no DOM, no network. Backward compatible:
   nothing here changes OCR, voice, reconcile, matching or the backend.
   =================================================================== */
const IntakeCore=(function(){
  /** @typedef {Object} Row */
  /** New intake session. @param {string} user @returns {Object} */
  function newSession(user){ return { id:'IS'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36),
    startTime:new Date().toISOString(), completedTime:'', createdBy:user||'staff', status:'draft', counts:{CAMERA:0,GALLERY:0,VOICE:0} }; }
  /** @param {Object} session @param {string} mode */
  function bump(session,mode){ if(!session) return; const m=String(mode||'').toUpperCase(); if(!session.counts[m]) session.counts[m]=0; session.counts[m]++; }

  const has=v=>v!==''&&v!=null&&String(v).trim()!=='';
  /** Heuristic per-field confidence (transparent stand-in for model scores). @returns {Object<string,'high'|'med'|'low'>} */
  function fieldConf(r){ return {
    name:    !has(r.name)?'low':(String(r.name).trim().length>=3?'high':'med'),
    potency: !has(r.potency)?'low':(/^(MT|Q|\d+X|\d+|1M|LM\d+|\d+M)$/i.test(String(r.potency).trim())?'high':'med'),
    pack:    !has(r.pack)?'low':(/\d+\s*(ML|G)\b/i.test(String(r.pack))?'high':'med'),
    qty:     (r.action==='skip')?'high':(!has(r.qty)?'low':(Number(r.qty)>0?'high':'med')),
    expiry:  !has(r.expiry)?'med':(/^\d{4}-\d{2}$/.test(String(r.expiry).trim())?'high':'med'),
    supplier:!has(r.supplier)?'med':'high',
    barcode: !has(r.barcode)?'high':(/^\d{8,}$/.test(String(r.barcode).replace(/\D/g,''))?'high':'med'),
    category:!has(r.category)?'med':'high'
  }; }
  /** Overall review tier (drives smart grouping). @returns {'high'|'med'|'low'} */
  function tier(r){ if(r.action==='skip') return 'high'; const c=fieldConf(r);
    if(c.name==='low'||c.qty==='low'||r.confidence==='low') return 'low';
    if(c.name==='med'||c.potency==='low'||c.pack==='low'||c.qty==='med'||r.confidence==='med') return 'med';
    return 'high'; }

  function norm(s){ return String(s||'').toUpperCase().replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
  function bigrams(s){ const o={}; for(let i=0;i<s.length-1;i++){ const g=s.slice(i,i+2); o[g]=(o[g]||0)+1; } return o; }
  /** Dice-coefficient name similarity 0..1. */
  function dice(a,b){ a=norm(a); b=norm(b); if(!a||!b) return 0; if(a===b) return 1;
    const A=bigrams(a),B=bigrams(b); let inter=0,sa=0,sb=0;
    for(const k in A){ sa+=A[k]; if(B[k]) inter+=Math.min(A[k],B[k]); } for(const k in B) sb+=B[k];
    return (sa+sb)?(2*inter)/(sa+sb):0; }
  /** Flag in-session duplicates (fuzzy). Mutates rows: sets r.dupOf. Bucketed by name
   *  prefix + exact matched-id map so 500+ rows stay fast. @returns {Array} pairs */
  function findDuplicates(rows){ const pairs=[];
    rows.forEach(r=>{ r.dupOf=''; });
    const byId={};      // matchId -> {id, idx} of earliest row with that matched id
    const buckets={};   // name-prefix -> earlier candidate rows (ascending idx)
    for(let i=0;i<rows.length;i++){ const a=rows[i]; if(a.action==='skip'||a.dupAck) continue;
      let cand = (a.matchId && byId[a.matchId]!=null) ? byId[a.matchId] : null;     // exact matched-id duplicate
      const key=norm(a.name).slice(0,3); const bucket=buckets[key]||(buckets[key]=[]);
      for(let k=0;k<bucket.length;k++){ const b=bucket[k];
        if(norm(a.potency)===norm(b.potency) && norm(a.pack)===norm(b.pack) && dice(a.name,b.name)>=0.82){
          if(!cand || b.idx<cand.idx) cand={id:b.id,idx:b.idx};   // earliest of id / fuzzy, like brute-force
          break; } }
      if(cand){ a.dupOf=cand.id; pairs.push({a:a.id,b:cand.id,sim:1}); }
      if(a.matchId && byId[a.matchId]==null) byId[a.matchId]={id:a.id,idx:i};
      bucket.push({id:a.id,name:a.name,potency:a.potency,pack:a.pack,idx:i}); }
    return pairs; }
  /** Merge `from` into `into` (fill blanks; sum qty if same matched id); skip `from`. */
  function mergeRows(into,from){ ['name','potency','pack','unitCost','supplier','mfd','expiry','barcode','category','matchId','matchName'].forEach(k=>{
      if((into[k]===''||into[k]==null)&&has(from[k])) into[k]=from[k]; });
    if(has(into.qty)&&has(from.qty)&&into.matchId&&into.matchId===from.matchId) into.qty=Number(into.qty)+Number(from.qty);
    else if(!has(into.qty)&&has(from.qty)) into.qty=from.qty;
    from.action='skip'; from.dupOf=''; return into; }

  /** Per-row warnings. @returns {string[]} */
  function rowWarnings(r){ const w=[]; if(r.action==='skip') return w;
    if(!has(r.name)) w.push('Missing medicine name');
    if(!has(r.potency)) w.push('Missing potency');
    if(!has(r.expiry)) w.push('Missing expiry');
    if(!has(r.supplier)) w.push('Missing supplier');
    if(!has(r.qty)||Number(r.qty)<=0) w.push('Quantity not set');
    if(has(r.qty)&&Number(r.qty)>500) w.push('Unusually high quantity ('+r.qty+')');
    if(has(r.barcode)&&!/^\d{8,}$/.test(String(r.barcode).replace(/\D/g,''))) w.push('Barcode looks unreadable');
    if(r.dupOf&&!r.dupAck) w.push('Possible duplicate in this intake');
    if(r.confidence==='low') w.push('Low OCR confidence — please check');
    return w; }
  function allWarnings(rows){ const out=[]; rows.forEach(r=>rowWarnings(r).forEach(m=>out.push({id:r.id,name:r.name||'(unnamed)',msg:m}))); return out; }

  /** Final pre-stage validation. @returns {{ok:boolean,errors:Array,warnings:Array,count:number}} */
  function validate(rows){ const errors=[],warnings=[]; const act=rows.filter(r=>r.action!=='skip');
    act.forEach(r=>{ if(!String(r.name).trim()) errors.push({id:r.id,field:'name',msg:'Medicine name required'});
      if(r.action==='receive'&&!r.matchId) errors.push({id:r.id,field:'match',msg:'Receive needs a matched item'});
      if(!has(r.qty)||Number(r.qty)<=0) errors.push({id:r.id,field:'qty',msg:'Quantity must be greater than 0'}); });
    rows.forEach(r=>rowWarnings(r).forEach(m=>warnings.push({id:r.id,msg:m})));
    return { ok:errors.length===0&&act.length>0, errors, warnings, count:act.length }; }

  /** Session summary counts. */
  function summarize(rows,session){ const s={camera:0,gallery:0,voice:0,total:0,matched:0,newItems:0,warnings:0,skipped:0};
    rows.forEach(r=>{ if(r.action==='skip'){ s.skipped++; return; } s.total++;
      const cm=String(r.captureMode||'CAMERA').toUpperCase();
      if(cm==='CAMERA')s.camera++; else if(cm==='GALLERY')s.gallery++; else if(cm==='VOICE')s.voice++;
      if(r.action==='receive')s.matched++; else if(r.action==='add')s.newItems++;
      if(rowWarnings(r).length)s.warnings++; });
    return s; }

  // ---- auto-save / resume (localStorage; review rows + session, not raw photos) ----
  const KEY='wiseLensDraft';
  function saveDraft(session,rows){ try{ localStorage.setItem(KEY,JSON.stringify({savedAt:new Date().toISOString(),session,rows})); return true; }catch(e){ return false; } }
  function loadDraft(){ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }
  function hasDraft(){ const d=loadDraft(); return !!(d&&d.rows&&d.rows.length); }
  function clearDraft(){ try{ localStorage.removeItem(KEY); }catch(e){} }

  return { newSession, bump, fieldConf, tier, dice, findDuplicates, mergeRows, rowWarnings, allWarnings, validate, summarize,
    saveDraft, loadDraft, hasDraft, clearDraft };
})();
window.IntakeCore=IntakeCore;

/** Format remaining time from progress. @returns {string} */
function etaFmt(done,total,elapsedMs){ if(done<=0||total<=0||done>=total) return '';
  const rem=Math.round((elapsedMs/done)*(total-done)/1000);
  if(rem<1) return '<1s'; if(rem<60) return rem+'s'; const m=Math.floor(rem/60),s=rem%60; return m+'m'+(s?' '+s+'s':''); }

/* ---- virtual list (window-scroll windowing for big review lists) ---- */
const VList=(function(){
  const HID=72, HEX=392, OVER=900, MIN=40;
  /** Pure window math. @returns {{start:number,end:number,padTop:number,padBottom:number,total:number}} */
  function computeWindow(scrollTop, viewportH, heights, overscan){
    const n=heights.length; const off=new Array(n+1); off[0]=0;
    for(let i=0;i<n;i++) off[i+1]=off[i]+heights[i];
    const total=off[n];
    const top=Math.max(0, scrollTop-overscan), bottom=scrollTop+viewportH+overscan;
    let start=0; while(start<n && off[start+1]<=top) start++;
    let end=start; while(end<n && off[end]<bottom) end++;
    if(end<start) end=start;
    return { start, end, padTop:off[start], padBottom:Math.max(0,total-off[end]), total };
  }
  /** Mount a windowed list. renderItem(item,i)->html, bindRoot(root) binds visible nodes. */
  function mount(host, items, renderItem, bindRoot){
    const heights=items.map(r=>(IntakeCore.tier(r)!=='high'&&r.action!=='skip')?HEX:HID);
    host.style.position='relative';
    function paint(){
      try{
        const top=host.offsetTop||0;
        const scrollTop=Math.max(0,(window.scrollY||window.pageYOffset||0)-top);
        const vh=window.innerHeight||800;
        const win=computeWindow(scrollTop,vh,heights,OVER);
        host.style.paddingTop=win.padTop+'px'; host.style.paddingBottom=win.padBottom+'px';
        let h=''; for(let i=win.start;i<win.end;i++) h+=renderItem(items[i],i);
        host.innerHTML=h; if(bindRoot) bindRoot(host);
        let changed=false;
        [...host.children].forEach(el=>{ const i=+el.getAttribute('data-vi'); const hh=el.offsetHeight;
          if(hh && Math.abs(hh-heights[i])>4){ heights[i]=hh; changed=true; } });
        if(changed){ // one correction pass so spacers settle
          const w2=computeWindow(scrollTop,vh,heights,OVER);
          host.style.paddingTop=w2.padTop+'px'; host.style.paddingBottom=Math.max(0,w2.padBottom)+'px';
        }
      }catch(e){ host.innerHTML=items.map(renderItem).join(''); if(bindRoot) bindRoot(host); }
    }
    let raf=0; const onScroll=()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=0; paint(); }); };
    window.addEventListener('scroll',onScroll,{passive:true}); window.addEventListener('resize',onScroll,{passive:true});
    window._vlCleanup=()=>{ window.removeEventListener('scroll',onScroll); window.removeEventListener('resize',onScroll); };
    paint();
  }
  return { computeWindow, mount, MIN };
})();
window.VList=VList;

/* ---- offline upload queue (auto-retry on reconnect) ---- */
const OfflineQueue=(function(){
  const KEY='wiseLensQueue';
  function read(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
  function write(q){ try{ localStorage.setItem(KEY,JSON.stringify(q)); }catch(e){} }
  function enqueue(batch){ const q=read();
    const item={ id:'Q'+Date.now().toString(36)+Math.floor(Math.random()*1e3).toString(36), createdAt:new Date().toISOString(),
      rows:batch.rows, session:batch.session||null, tries:0 };
    q.push(item); write(q); return item; }
  function list(){ return read(); } function size(){ return read().length; }
  function remove(id){ write(read().filter(x=>x.id!==id)); } function clear(){ write([]); }
  /** Try to upload every queued batch. poster(rows)->{ok}. @returns {{sent:number,remaining:number}} */
  async function flush(poster, onProgress){ const q=read(); let sent=0; const total=q.length;
    for(const item of q.slice()){
      let ok=false;
      try{ const r=await poster(item.rows); ok=!!(r&&r.ok); }catch(e){ ok=false; }
      if(ok){ remove(item.id); sent++; onProgress&&onProgress(sent,total,item); }
      else { const all=read(); const f=all.find(x=>x.id===item.id); if(f){ f.tries=(f.tries||0)+1; write(all); } }
    }
    return { sent, remaining:read().length };
  }
  return { enqueue, list, size, remove, clear, flush, _KEY:KEY };
})();
window.OfflineQueue=OfflineQueue;

async function flushQueue(){
  if(typeof navigator!=='undefined' && navigator.onLine===false) return;
  if(!OfflineQueue.size()) return;
  const res=await OfflineQueue.flush(async rows=>{ try{ return await post({action:'stageIntake',rows}); }catch(e){ return {ok:false}; } });
  if(res.sent) toast('Uploaded '+res.sent+' queued intake'+(res.sent>1?'s':''));
  if(S.screen==='capture') render();
}

/* ===================================================================
   BATCH ACTIONS  —  multi-select + bulk ops for large sessions.
   Selection lives on the row model (r.sel), so it survives the
   virtual-scroll mount/unmount cycle. The toolbar sits outside the
   windowed #cards container, so it never gets unmounted.
   =================================================================== */
const Batch=(function(){
  /** @param {Array} rows @returns {Array} selected rows (model order) */
  function selected(rows){ return rows.filter(r=>r.sel); }
  function count(rows){ let n=0; for(const r of rows) if(r.sel) n++; return n; }
  function clear(rows){ rows.forEach(r=>{ r.sel=false; }); }
  function all(rows,on){ rows.forEach(r=>{ if(r.action!=='skip'||!on) r.sel=!!on; }); }
  /** Apply one field value to every selected row. @returns {number} affected */
  function applyField(rows,field,val){ const s=selected(rows); s.forEach(r=>{ r[field]=val; }); return s.length; }
  /** Mark selected rows as skip. @returns {number} */
  function skip(rows){ const s=selected(rows); s.forEach(r=>{ r.action='skip'; r.sel=false; }); return s.length; }
  /** Remove selected rows. @returns {Array} new rows array */
  function del(rows){ return rows.filter(r=>!r.sel); }
  /** Merge all selected into the earliest selected; sum quantities; skip the rest. @returns {?string} target id */
  function merge(rows){ const s=selected(rows); if(s.length<2) return null;
    const hasV=v=>v!==''&&v!=null&&String(v).trim()!=='';
    const target=s[0];
    let total=0, any=false; s.forEach(r=>{ if(hasV(r.qty)){ total+=Number(r.qty)||0; any=true; } }); // snapshot before mutation
    for(let i=1;i<s.length;i++) IntakeCore.mergeRows(target,s[i]);   // fills blank fields, skips others
    if(any) target.qty=total;                                        // explicit merge → total the quantities
    clear(rows); target.sel=false; return target.id; }
  return { selected, count, clear, all, applyField, skip, del, merge };
})();
window.Batch=Batch;

  const meta={ supplier:{label:'Apply supplier / brand',ph:'e.g. SBL'},
    category:{label:'Apply category',ph:'e.g. MT'},
    potency:{label:'Apply potency',ph:'e.g. 200 / MT / 6X'},
    expiry:{label:'Apply expiry',ph:'YYYY-MM'} }[field];
  const n=Batch.count(S.rows);
  const html=`<div class="imodal-scrim" id="imodalHost2"><div class="imodal" role="dialog" aria-modal="true" aria-label="${meta.label}">
    <h2>${meta.label}</h2><div class="sub">Applies to ${n} selected item${n===1?'':'s'}.</div>
    <div class="f wide" style="margin-top:10px"><input id="bvVal" class="mono" placeholder="${meta.ph}" aria-label="${meta.label}" style="width:100%"></div>
    <div class="row2"><button class="no" id="bvCancel">Cancel</button><button class="go" id="bvGo">Apply to ${n}</button></div>
  </div></div>`;
  const host=document.createElement('div'); host.innerHTML=html; document.body.appendChild(host);
  const close=()=>host.remove();
  const inp=host.querySelector('#bvVal'); if(inp&&inp.focus) try{ inp.focus(); }catch(e){}
  host.querySelector('#bvCancel').addEventListener('click',close);
  host.querySelector('#imodalHost2').addEventListener('click',e=>{ if(e.target.id==='imodalHost2') close(); });
  host.querySelector('#bvGo').addEventListener('click',()=>{
    const val=(host.querySelector('#bvVal').value||'').trim();
    if(field==='expiry' && val && !/^\d{4}-\d{2}$/.test(val)){ toast('Use YYYY-MM for expiry'); return; }
    const cnt=Batch.applyField(S.rows,field,val); Batch.clear(S.rows);
    close(); toast('Updated '+cnt+' item'+(cnt===1?'':'s')); scheduleSave(); renderReview();
  });
}

/* ---- boot ---- */
(function bootResume(){
  applyA11y(); initA11yUI();
  if(typeof window!=='undefined') window.addEventListener('online', flushQueue);
  render();
  flushQueue();
})();
</script>
</body>
</html>
